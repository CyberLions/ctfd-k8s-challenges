{% extends "admin/challenges/update.html" %}

{% block value %}
{{ super() }}

<div class="form-group">
  <label>
    Docker Image:<br>
    <small class="form-text text-muted">
      Container image to deploy
    </small>
  </label>
  <input type="text" class="form-control" name="image" value="{{ challenge.image or '' }}" placeholder="registry.example.com/challenges/web:v1" required>
</div>

<div class="form-group">
  <label>
    Port:<br>
    <small class="form-text text-muted">
      Internal container port
    </small>
  </label>
  <input type="number" class="form-control" name="port" value="{{ challenge.port or 80 }}" min="1" max="65535">
</div>

<div class="form-group">
  <label>
    Connection Type:<br>
    <small class="form-text text-muted">
      How users will connect to the container
    </small>
  </label>
  <select class="form-control" name="connection_type" id="connection-type-select">
    <option value="http" {{ 'selected' if (challenge.connection_type or 'http') == 'http' else '' }}>HTTP / Web</option>
    <option value="tcp" {{ 'selected' if challenge.connection_type == 'tcp' else '' }}>TCP</option>
  </select>
</div>

<div class="form-group prefix-group-conditional" id="prefix-group" data-conditional="http" style="{% if challenge.connection_type == 'tcp' %}display: none;{% endif %}">
  <label>
    Subdomain Prefix:<br>
    <small class="form-text text-muted">
      Prefix for the challenge subdomain (e.g., "web-intro" → web-intro-abc123.domain.org). Only used for HTTP / Web challenges.
    </small>
  </label>
  <input 
    type="text" 
    class="form-control" 
    name="prefix" 
    id="prefix-input"
    value="{{ challenge.prefix or '' }}"
    placeholder="web-challenge" 
    pattern="[a-z0-9-]+"
    data-required-when="http"
  >
</div>

<div class="form-group">
  <label>
    Command (optional):<br>
    <small class="form-text text-muted">
      Custom command/entrypoint to run in the container
    </small>
  </label>
  <input type="text" class="form-control" name="command" value="{{ challenge.command or '' }}" placeholder="">
</div>

<div class="form-group">
  <label>
    Memory Limit:<br>
    <small class="form-text text-muted">
      Memory limit for the container
    </small>
  </label>
  <input type="text" class="form-control" name="memory_limit" value="{{ challenge.memory_limit or '256Mi' }}" placeholder="256Mi">
</div>

<div class="form-group">
  <label>
    CPU Limit (optional):<br>
    <small class="form-text text-muted">
      CPU limit for the container
    </small>
  </label>
  <input type="text" class="form-control" name="cpu_limit" value="{{ challenge.cpu_limit or '' }}" placeholder="500m">
</div>

<div class="form-group">
  <label>
    Timeout (seconds):<br>
    <small class="form-text text-muted">
      How long instances will run before auto-termination
    </small>
  </label>
  <input type="number" class="form-control" name="timeout" value="{{ challenge.timeout or 3600 }}" min="60" placeholder="3600">
</div>
{% endblock %}
