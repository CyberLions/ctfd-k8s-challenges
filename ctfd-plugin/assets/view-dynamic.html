{% extends "challenge.html" %}

{% block description %}
{{ super() }}

<div id="container-challenge-ctl" class="mt-3 mb-4" data-challenge-id="{{ challenge.id }}">
  <div id="container-idle" style="display:none">
    <button type="button" class="btn btn-primary w-100" id="container-start-btn" onclick="window.k8sStartContainer(this)">
      <i class="fas fa-play"></i> Start Instance
    </button>
  </div>
  <div id="container-loading">
    <button type="button" class="btn btn-primary w-100" disabled>
      <span class="spinner-border spinner-border-sm"></span> <span id="container-loading-text">Loading…</span>
    </button>
  </div>
  <div id="container-active" style="display:none">
    <div class="alert alert-info mb-0">
      <div id="container-web-info" style="display:none">
        <p class="mb-2">
          <strong>Connection:</strong>
          <a id="container-connection" href="#" target="_blank" rel="noopener"></a>
        </p>
      </div>
      <div id="container-tcp-info" style="display:none">
        <p class="mb-2">
          <strong>Host:</strong> <code id="container-tcp-host"></code>
        </p>
        <p class="mb-2">
          <strong>Port:</strong> <code id="container-tcp-port"></code>
        </p>
      </div>
      <p class="mb-2" id="container-started-by" style="display:none">
        <strong>Started by:</strong> <span id="container-started-by-name"></span>
      </p>
      <p class="mb-2">
        <strong>Expires in:</strong> <span id="container-timer" class="badge bg-warning text-dark">--:--:--</span>
      </p>
      <div class="btn-group btn-group-sm" role="group">
        <button type="button" class="btn btn-outline-secondary" id="container-stop-btn" onclick="window.k8sStopContainer(this)">
          <i class="fas fa-stop"></i> Stop
        </button>
        <button type="button" class="btn btn-outline-secondary" id="container-renew-btn" onclick="window.k8sRenewContainer(this)">
          <i class="fas fa-redo"></i> Reset
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
