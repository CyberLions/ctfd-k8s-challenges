{% extends "admin/challenges/create.html" %}

{% block header %}
<div class="alert alert-secondary" role="alert">
  Dynamic value container challenges decrease in value as they receive solves. The more solves a challenge has, the lower its value is to everyone.
</div>
{% endblock %}

{% block value %}
<div class="form-group">
  <label>
    Initial Value:<br>
    <small class="form-text text-muted">
      This is how many points the challenge is worth initially.
    </small>
  </label>
  <input type="number" class="form-control" name="initial_value" placeholder="Enter initial value" min="1" required>
</div>

<div class="form-group">
  <label>
    Decay Function:<br>
    <small class="form-text text-muted">
      <span>How the dynamic value will be calculated based on the Decay value</span>
      <ul>
        <li>Linear: Calculated as <code>Initial - (Decay × SolveCount)</code>. Equal deduction per solve.</li>
        <li>Logarithmic: Calculated as <code>(((Minimum - Initial) / (Decay²)) × (SolveCount²)) + Initial</code>. Earlier solves lose less; later solves lose more.</li>
      </ul>
    </small>
  </label>
  <select name="decay_function" class="custom-select">
    <option value="linear">Linear</option>
    <option value="logarithmic">Logarithmic</option>
  </select>
</div>

<div class="form-group">
  <label>
    Decay:<br>
    <small class="form-text text-muted">
      <span>The decay value is used differently depending on the above Decay Function</span>
      <ul>
        <li>Linear: The amount of points deducted per solve.</li>
        <li>Logarithmic: The amount of solves before the challenge reaches its minimum value.</li>
      </ul>
    </small>
  </label>
  <input type="number" class="form-control" name="decay" min="1" placeholder="Enter Decay value" required>
</div>

<div class="form-group">
  <label>
    Minimum Value:<br>
    <small class="form-text text-muted">
      This is the lowest that the challenge can be worth
    </small>
  </label>
  <input type="number" class="form-control" name="minimum_value" min="0" placeholder="Enter minimum value" required>
</div>

<div class="form-group">
  <label>
    Docker Image:<br>
    <small class="form-text text-muted">
      Container image to deploy (e.g., registry.example.com/challenges/web:v1)
    </small>
  </label>
  <input type="text" class="form-control" name="image" placeholder="registry.example.com/challenges/web:v1" required>
</div>

<div class="form-group">
  <label>
    Port:<br>
    <small class="form-text text-muted">
      Internal container port
    </small>
  </label>
  <input type="number" class="form-control" name="port" value="80" min="1" max="65535">
</div>

<div class="form-group">
  <label>
    Connection Type:<br>
    <small class="form-text text-muted">
      How users will connect to the container
    </small>
  </label>
  <select class="form-control" name="connection_type">
    <option value="http">HTTP / Web</option>
    <option value="tcp">TCP</option>
  </select>
</div>

<div class="form-group">
  <label>
    Memory Limit:<br>
    <small class="form-text text-muted">
      Memory limit for the container (e.g., 256Mi, 512Mi, 1Gi)
    </small>
  </label>
  <input type="text" class="form-control" name="memory_limit" value="256Mi" placeholder="256Mi">
</div>

<div class="form-group">
  <label>
    CPU Limit (optional):<br>
    <small class="form-text text-muted">
      CPU limit for the container (e.g., 500m, 1)
    </small>
  </label>
  <input type="text" class="form-control" name="cpu_limit" placeholder="500m">
</div>

<div class="form-group">
  <label>
    Timeout (seconds):<br>
    <small class="form-text text-muted">
      How long instances will run before auto-termination
    </small>
  </label>
  <input type="number" class="form-control" name="timeout" value="3600" min="60" placeholder="3600">
</div>
{% endblock %}

{% block type %}
<input type="hidden" value="container-dynamic" name="type" id="chaltype">
{% endblock %}
